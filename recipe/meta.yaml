{% set name = "python-javabridge" %}
{% set version = "4.0.5" %}


package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name | replace('-', '_') }}-{{ version }}.tar.gz
  sha256: 0cf3292466142468a6134c91c118d453497eaf0e76b59be442bf4985683dcccd

build:
  number: 0
  script: {{ PYTHON }} -m pip install . -vv
  skip: true  # [win]

requirements:
  build:
    - {{ compiler('c') }}
    - {{ stdlib("c") }}
  host:
    - cython >=0.29.16
    - numpy  >=1.20.1
    - pip
    - python  >3.6
    - openjdk
  run:
    - numpy  >=1.20.1
    - python  >3.6
    - {{ pin_compatible('numpy') }}
    - openjdk
  run_constrained:
    - javabridge ==9999999999

test:
  imports:
    - javabridge
    - javabridge.tests
  requires:
    - nose
    - openjdk

about:
  home: http://github.com/CellProfiler/python-javabridge/
  summary: Python wrapper for the Java Native Interface
  license: BSD-3-Clause
  license_family: BSD
  license_file: LICENSE

extra:
  recipe-maintainers:
    - raivivek
